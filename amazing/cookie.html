<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Cookie Clicker</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #f5efe6;
    }

    /* Counter */
    body {
        counter-reset: score;
    }

    input[type="checkbox"]:checked {
        counter-increment: score;
    }

    .score::after {
        content: counter(score);
        font-size: 2rem;
        font-weight: bold;
    }

    .score {
        margin-bottom: 20px;
        font-size: 1.5rem;
    }

    /* Cookie button */
    .cookie {
        width: 200px;
        height: 200px;
        background: #c68642;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
        box-shadow: inset -10px -10px 0 #a9713a;
    }

    .cookie:active {
        transform: scale(0.95);
    }

    /* Chocolate chips */
    .chip {
        width: 20px;
        height: 20px;
        background: #4b2e1e;
        border-radius: 50%;
        position: absolute;
    }

    .chip1 { top: 40px; left: 50px; }
    .chip2 { top: 120px; left: 80px; }
    .chip3 { top: 70px; left: 120px; }
    .chip4 { top: 110px; left: 40px; }

    /* Hide checkboxes */
    input {
        display: none;
    }

    /* Make only ONE checkbox clickable at a time */
    input:not(:checked) + label {
        display: block;
    }

    input:checked + label {
        display: none;
    }
</style>
</head>

<body>

<div class="score">Cookies: </div>

<!-- Multiple clicks supported -->
<input type="checkbox" id="c1">
<label for="c1" class="cookie">
    <div class="chip chip1"></div>
    <div class="chip chip2"></div>
    <div class="chip chip3"></div>
    <div class="chip chip4"></div>
</label>

<input type="checkbox" id="c2">
<label for="c2" class="cookie"></label>

<input type="checkbox" id="c3">
<label for="c3" class="cookie"></label>

<input type="checkbox" id="c4">
<label for="c4" class="cookie"></label>

<input type="checkbox" id="c5">
<label for="c5" class="cookie"></label>

</body>
</html>
